{% extends "layout.html" %}
{% block container %}
{% import "_macros.html" as macros %}

<div class="min-h-screen bg-neutral-secondary-soft py-8">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-lg border border-default p-6">
            <h2 class="text-lg font-medium text-heading mb-6 pb-2 border-b border-default">
                Nueva Inscripción
            </h2>

            <form action="" method="POST" novalidate class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                
                <div>
                    <label class="block text-sm font-medium text-heading mb-1">Alumno</label>
                    <select name="alumno_id" class="w-full px-3 py-2 border border-default rounded-md focus:border-brand focus:ring-1 focus:ring-brand outline-none" required>
                        <option value="">Selecciona un alumno</option>
                        {% for alumno in alumnos %}
                        <option value="{{ alumno.id }}">{{ alumno.nombre }} {{ alumno.apellidos }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-heading mb-1">Curso</label>
                    <select name="curso_id" class="w-full px-3 py-2 border border-default rounded-md focus:border-brand focus:ring-1 focus:ring-brand outline-none" required>
                        <option value="">Selecciona un curso</option>
                        {% for curso in cursos %}
                        <option value="{{ curso.id }}">{{ curso.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <button type="submit" class="w-full bg-brand text-white py-2 px-4 rounded-md hover:bg-brand-strong transition-colors text-sm font-medium">
                    Inscribir Alumno
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
